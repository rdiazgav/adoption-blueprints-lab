apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: retailflow
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: retailflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: retailflow
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
