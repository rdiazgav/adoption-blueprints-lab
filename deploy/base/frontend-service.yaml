apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: retailflow
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: retailflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: retailflow
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
