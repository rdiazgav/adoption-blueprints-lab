apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: retailflow
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: retailflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/part-of: retailflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: retailflow
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: api-gateway
      containers:
        - name: api-gateway
          image: quay.io/rdiazgav/retailflow-api-gateway:1.0.1
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: CATALOG_URL
              value: "http://catalog:8080"
            - name: ORDERS_URL
              value: "http://orders:8080"
            - name: PAYMENTS_URL
              value: "http://payments:8080"
            - name: RECOMMENDATIONS_URL
              value: "http://recommendations:8000"
            - name: OTEL_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
