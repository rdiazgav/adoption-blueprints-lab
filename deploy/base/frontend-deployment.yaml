apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: retailflow
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: retailflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/part-of: retailflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: retailflow
    spec:
      containers:
        - name: frontend
          image: quay.io/rdiazgav/retailflow-frontend:1.0.0
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: API_GATEWAY_URL
              value: "http://api-gateway:8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
