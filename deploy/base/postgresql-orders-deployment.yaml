apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-orders
  namespace: retailflow
  labels:
    app.kubernetes.io/name: postgresql-orders
    app.kubernetes.io/version: "15"
    app.kubernetes.io/part-of: retailflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql-orders
      app.kubernetes.io/part-of: retailflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql-orders
        app.kubernetes.io/version: "15"
        app.kubernetes.io/part-of: retailflow
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "orders"
            - name: POSTGRES_USER
              value: "orders"
            - name: POSTGRES_PASSWORD
              value: "orders"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "orders", "-d", "orders"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "orders", "-d", "orders"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          emptyDir: {}
