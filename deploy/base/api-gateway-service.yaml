apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: retailflow
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: retailflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: retailflow
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
