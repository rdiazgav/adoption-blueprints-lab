apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retailflow
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: retailflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
      app.kubernetes.io/part-of: retailflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: retailflow
    spec:
      containers:
        - name: catalog
          image: quay.io/rdiazgav/retailflow-catalog:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgresql-catalog:5432/catalog"
            - name: DB_USER
              value: "catalog"
            - name: DB_PASSWORD
              value: "catalog"
            - name: OTEL_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
