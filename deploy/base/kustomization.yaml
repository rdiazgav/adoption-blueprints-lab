apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retailflow

resources:
  # Namespace
  - namespace.yaml

  # Application services
  - api-gateway-deployment.yaml
  - api-gateway-service.yaml
  - orders-deployment.yaml
  - orders-service.yaml
  - catalog-deployment.yaml
  - catalog-service.yaml
  - payments-v1-deployment.yaml
  - payments-v2-deployment.yaml
  - payments-service.yaml
  - recommendations-deployment.yaml
  - recommendations-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml

  # Databases
  - postgresql-orders-deployment.yaml
  - postgresql-orders-service.yaml
  - postgresql-catalog-deployment.yaml
  - postgresql-catalog-service.yaml
  - postgresql-payments-deployment.yaml
  - postgresql-payments-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
