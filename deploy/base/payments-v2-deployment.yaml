apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-v2
  namespace: retailflow
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/version: v2
    app.kubernetes.io/part-of: retailflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments
      app.kubernetes.io/version: v2
      app.kubernetes.io/part-of: retailflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments
        app.kubernetes.io/version: v2
        app.kubernetes.io/part-of: retailflow
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: payments
      containers:
        - name: payments
          image: quay.io/rdiazgav/retailflow-payments:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgresql-payments:5432/payments"
            - name: DB_USER
              value: "payments"
            - name: DB_PASSWORD
              value: "payments"
            - name: VERSION
              value: "v2"
            - name: OTEL_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
