apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retailflow

resources:
  - ../../base
  - frontend-route.yaml
  - retailflow-config.yaml
  - postgresql-pvc.yaml

patches:
  # All deployments: cpu 50m/300m, memory 128Mi/384Mi
  - path: patches/patch-resources-all.yaml

  # PostgreSQL: replace emptyDir with PVC
  - path: patches/patch-postgresql-catalog.yaml
    target:
      kind: Deployment
      name: postgresql-catalog
  - path: patches/patch-postgresql-orders.yaml
    target:
      kind: Deployment
      name: postgresql-orders
  - path: patches/patch-postgresql-payments.yaml
    target:
      kind: Deployment
      name: postgresql-payments
