# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:catalog}
quarkus.datasource.password=${DB_PASSWORD:catalog}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/catalog}
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# Test profile - H2
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:catalog;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Health
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
%test.quarkus.otel.enabled=false
