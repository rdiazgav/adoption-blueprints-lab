# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:payments}
quarkus.datasource.password=${DB_PASSWORD:payments}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/payments}
quarkus.hibernate-orm.database.generation=update

# Test profile - H2
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:payments;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# Health
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
%test.quarkus.otel.enabled=false

# Version - switch v1/v2 behavior via VERSION env var
app.version=${VERSION:v1}
