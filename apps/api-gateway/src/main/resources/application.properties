# Health
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
%test.quarkus.otel.enabled=false

# Downstream service URLs (MicroProfile REST Client)
quarkus.rest-client.catalog.url=${CATALOG_URL:http://catalog:8080}
quarkus.rest-client.orders.url=${ORDERS_URL:http://orders:8080}
quarkus.rest-client.payments.url=${PAYMENTS_URL:http://payments:8080}
quarkus.rest-client.recommendations.url=${RECOMMENDATIONS_URL:http://recommendations:8000}

# Disable REST client URL requirement in tests (no real downstream services)
%test.quarkus.rest-client.catalog.url=http://localhost:9999
%test.quarkus.rest-client.orders.url=http://localhost:9999
%test.quarkus.rest-client.payments.url=http://localhost:9999
%test.quarkus.rest-client.recommendations.url=http://localhost:9999
