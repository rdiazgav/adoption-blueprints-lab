apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: retailflow
  labels:
    app.kubernetes.io/part-of: retailflow
    app.kubernetes.io/managed-by: kustomize
  annotations:
    tekton.dev/displayName: "Maven Build (Quarkus)"
    tekton.dev/tags: java, maven, quarkus
spec:
  description: >-
    Builds a Quarkus service using the Maven wrapper and caches dependencies.
    Expects the Maven wrapper (mvnw) to be present in the service directory.
    Dependency artifacts are stored in the maven-cache workspace to speed up
    subsequent runs.
  params:
    - name: SERVICE_DIR
      type: string
      description: "Path to the service directory relative to workspace root, e.g. apps/catalog"
    - name: MAVEN_ARGS
      type: string
      default: "-DskipTests=false"
      description: "Extra Maven arguments"
  workspaces:
    - name: source
      description: "Checked-out source code"
    - name: maven-cache
      description: "Persistent Maven local repository cache"
  steps:
    - name: mvn-package
      image: registry.access.redhat.com/ubi9/openjdk-21
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        MAVEN_VERSION=3.9.9
        MAVEN_HOME=$(workspaces.maven-cache.path)/.m2/maven-dist
        MAVEN_ZIP=/tmp/maven-dist.zip

        if [ ! -f "$MAVEN_HOME/bin/mvn" ]; then
          curl -fsSL \
            https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/${MAVEN_VERSION}/apache-maven-${MAVEN_VERSION}-bin.zip \
            -o "$MAVEN_ZIP"

          python3 -c "
        import zipfile, os, stat
        with zipfile.ZipFile('$MAVEN_ZIP') as z:
            z.extractall('$(workspaces.maven-cache.path)/.m2/')
        extracted = '$(workspaces.maven-cache.path)/.m2/apache-maven-${MAVEN_VERSION}'
        os.rename(extracted, '$MAVEN_HOME')
        for f in os.listdir('$MAVEN_HOME/bin'):
            p = os.path.join('$MAVEN_HOME/bin', f)
            os.chmod(p, os.stat(p).st_mode | stat.S_IEXEC | stat.S_IXGRP | stat.S_IXOTH)
        "
          rm -f "$MAVEN_ZIP"
        fi

        export PATH="$MAVEN_HOME/bin:$PATH"

        cd $(workspaces.source.path)/$(params.SERVICE_DIR)
        mvn package \
          -Dmaven.repo.local=$(workspaces.maven-cache.path)/.m2/repository \
          $(params.MAVEN_ARGS)
