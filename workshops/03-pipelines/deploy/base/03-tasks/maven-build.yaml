apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: retailflow
  labels:
    app.kubernetes.io/part-of: retailflow
    app.kubernetes.io/managed-by: kustomize
  annotations:
    tekton.dev/displayName: "Maven Build (Quarkus)"
    tekton.dev/tags: java, maven, quarkus
spec:
  description: >-
    Builds a Quarkus service using the Maven wrapper and caches dependencies.
    Expects the Maven wrapper (mvnw) to be present in the service directory.
    Dependency artifacts are stored in the maven-cache workspace to speed up
    subsequent runs.
  params:
    - name: SERVICE_DIR
      type: string
      description: "Path to the service directory relative to workspace root, e.g. apps/catalog"
    - name: MAVEN_ARGS
      type: string
      default: "-DskipTests=false"
      description: "Extra Maven arguments"
  workspaces:
    - name: source
      description: "Checked-out source code"
    - name: maven-cache
      description: "Persistent Maven local repository cache"
  steps:
    - name: mvn-package
      image: registry.access.redhat.com/ubi9/openjdk-21
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        MAVEN_VERSION=3.9.14
        MAVEN_URL=https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz
        MAVEN_HOME=/tmp/maven

        if [ ! -f "$MAVEN_HOME/bin/mvn" ]; then
          curl -fsSL "$MAVEN_URL" | tar -xz -C /tmp
          mv /tmp/apache-maven-${MAVEN_VERSION} "$MAVEN_HOME"
        fi

        export PATH="$MAVEN_HOME/bin:$PATH"

        cd $(workspaces.source.path)/$(params.SERVICE_DIR)
        mvn package \
          -Dmaven.repo.local=$(workspaces.maven-cache.path)/.m2/repository \
          $(params.MAVEN_ARGS)
